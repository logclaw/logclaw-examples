server:
  port: ${PORT:8080}

# OTel Java Agent reads these env vars automatically:
#   OTEL_EXPORTER_OTLP_ENDPOINT — Collector endpoint
#   OTEL_EXPORTER_OTLP_PROTOCOL — http/protobuf (default)
