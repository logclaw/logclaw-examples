name: CI — Build All Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fastapi:
    name: FastAPI Notes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/fastapi-notes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import main; print('FastAPI app imports OK')"

  express:
    name: Express Notes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/express-notes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  nextjs:
    name: Next.js Notes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/nextjs-notes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  nestjs:
    name: NestJS Notes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/nestjs-notes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  spring-boot:
    name: Spring Boot Notes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/spring-boot-notes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - run: mvn package -DskipTests -B
