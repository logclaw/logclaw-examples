version: "3.9"

services:
  # ── OTel Collector ────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
    environment:
      - LOGCLAW_ENDPOINT=${LOGCLAW_ENDPOINT:-https://otel.logclaw.ai}
      - LOGCLAW_API_KEY=${LOGCLAW_API_KEY:-}

  # ── FastAPI (Python) ──────────────────────────────────────────────────────
  fastapi-notes:
    build: ./examples/fastapi-notes
    ports:
      - "8001:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=fastapi-notes
    depends_on:
      - otel-collector

  # ── Express (Node.js) ─────────────────────────────────────────────────────
  express-notes:
    build: ./examples/express-notes
    ports:
      - "8002:3000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=express-notes
    depends_on:
      - otel-collector

  # ── Next.js ────────────────────────────────────────────────────────────────
  nextjs-notes:
    build: ./examples/nextjs-notes
    ports:
      - "8003:3000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=nextjs-notes
    depends_on:
      - otel-collector

  # ── NestJS ─────────────────────────────────────────────────────────────────
  nestjs-notes:
    build: ./examples/nestjs-notes
    ports:
      - "8004:3000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=nestjs-notes
    depends_on:
      - otel-collector

  # ── Spring Boot (Java) ────────────────────────────────────────────────────
  spring-boot-notes:
    build: ./examples/spring-boot-notes
    ports:
      - "8005:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=spring-boot-notes
    depends_on:
      - otel-collector
